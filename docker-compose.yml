version: '3.8'

services:
  signal_cli:
    build: ./services/signal_cli
    container_name: signal_cli
    volumes:
      - ./data/signal-cli:/home/.local/share/signal-cli
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - cert-net

  alert_service:
    build: ./services/alert_service
    container_name: alert_service
    env_file:
      - .env
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5005
      - DEDUP_WINDOW_MINUTES=30
      - SIGNAL_API_URL=http://signal_cli:8080
    volumes:
      - ./data:/data
    ports:
      - "5005:5005"
    restart: unless-stopped
    depends_on:
      - signal_cli
    networks:
      - cert-net

  web_watcher:
    build: ./services/web_watcher
    container_name: web_watcher
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5001
      - SCHEDULE_INTERVAL_MINUTES=${WEB_WATCHER_INTERVAL:-15}
    volumes:
      - ./data:/data
    ports:
      - "5001:5001"
    restart: unless-stopped
    depends_on:
      - alert_service
    networks:
      - cert-net

  target_test:
    image: vulnerables/web-dvwa
    container_name: target_test
    ports:
      - "8888:80"
    restart: unless-stopped
    profiles:
      - test
    networks:
      - cert-net

  vuln_scanner:
    build: ./services/vuln_scanner
    container_name: vuln_scanner
    env_file:
      - .env
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5002
      - SCHEDULE_INTERVAL_HOURS=${VULN_SCANNER_INTERVAL:-24}
    volumes:
      - ./data:/data
    ports:
      - "5002:5002"
    restart: unless-stopped
    depends_on:
      - alert_service
    networks:
      - cert-net

  ransomware_monitor:
    build: ./services/ransomware_monitor
    container_name: ransomware_monitor
    env_file:
      - .env
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5003
      - SCHEDULE_INTERVAL_HOURS=${VULN_SCANNER_INTERVAL:-24}
    volumes:
      - ./data:/data
    ports:
      - "5003:5003"
    restart: unless-stopped
    depends_on:
      - alert_service
    networks:
      - cert-net

  dashboard:
    build: ./dashboard
    container_name: dashboard
    environment:
      - WATCHER_URL=http://web_watcher:5001/api/data
      - VULN_URL=http://vuln_scanner:5002/api/data
      - RANSOMWARE_URL=http://ransomware_monitor:5003/api/data
    ports:
      - "${DASHBOARD_PORT:-8050}:8050"
    restart: unless-stopped
    depends_on:
      - web_watcher
    networks:
      - cert-net

networks:
  cert-net:
    driver: bridge