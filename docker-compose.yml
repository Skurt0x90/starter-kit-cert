version: '3.8'

services:

  web_watcher:
    build: ./services/web_watcher
    container_name: web_watcher
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5001
      - SCHEDULE_INTERVAL_MINUTES=${WEB_WATCHER_INTERVAL:-15}
    volumes:
      - ./data:/data
    ports:
      - "5001:5001"
    restart: unless-stopped
    networks:
      - cert-net

  dashboard:
    build: ./dashboard
    container_name: dashboard
    environment:
      - WATCHER_URL=http://web_watcher:5001/api/data
    ports:
      - "${DASHBOARD_PORT:-8050}:8050"
    restart: unless-stopped
    depends_on:
      - web_watcher
    networks:
      - cert-net

networks:
  cert-net:
    driver: bridge