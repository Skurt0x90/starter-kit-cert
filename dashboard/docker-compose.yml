version: '3.8'

services:
  dashboard:
    build: .
    container_name: dashboard
    ports:
      - "8050:8050"
    environment:
      - WATCHER_URL=http://web_watcher:5001/api/data
    restart: unless-stopped
    networks:
      - cert-net

networks:
  cert-net:
    external: true  # réseau créé par le compose racine