version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "8050:8050"
    volumes:
      - ./config:/app/config    # pour modifier sources.json sans rebuild
    networks:
      - cert-net

  watcher-aeroports:
    image: watcher-aeroports:latest
    ports:
      - "5001:5000"
    networks:
      - cert-net

networks:
  cert-net:
    driver: bridge
