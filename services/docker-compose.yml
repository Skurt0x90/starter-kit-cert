version: '3.8'

services:
  web_watcher:
    build: ./web_watcher
    container_name: web_watcher
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5001
      - SCHEDULE_INTERVAL_MINUTES=${WEB_WATCHER_INTERVAL:-15}
    volumes:
      - ../data:/data
    ports:
      - "5001:5001"
    restart: unless-stopped
    depends_on:
      - alert_service
    networks:
      - cert-net

  alert_service:
    build: ./alert_service
    container_name: alert_service
    env_file:
      - ../.env
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5005
      - DEDUP_WINDOW_MINUTES=30
    volumes:
      - ../data:/data
    ports:
      - "5005:5005"
    restart: unless-stopped
    networks:
      - cert-net

networks:
  cert-net:
    driver: bridge